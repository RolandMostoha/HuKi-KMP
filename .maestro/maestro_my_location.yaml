appId: ${APP_ID}
---
- launchApp:
    clearState: true
    permissions: { all: unset }
- setLocation:
    latitude: 47.7168079
    longitude: 18.8950729
- extendedWaitUntil:
    visible:
      id: MAP_MAPBOX
    timeout: 10000
- assertVisible:
    text: "My location - Not available"
- tapOn:
    id: MAIN_FAB_MY_LOCATION_BUTTON
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: "While using the app"
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
            visible: "Allow While Using App"
            timeout: 10000
            optional: false
      - tapOn: "Allow While Using App"
- assertVisible:
    text: "My location - Following"
- tapOn:
    id: MAIN_FAB_MY_LOCATION_BUTTON
- assertVisible:
    text: "My location - Live compass"
- swipe:
    direction: LEFT
- assertVisible:
    text: "My location - Visible"