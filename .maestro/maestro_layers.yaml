appId: ${APP_ID}
---
- launchApp:
    clearState: true
    permissions: { all: allow }
- setLocation:
    latitude: 47.7168079
    longitude: 18.8950729
- extendedWaitUntil:
    visible:
      id: MAP_MAPBOX
    timeout: 10000
- tapOn:
    text: "Layers"
- assertVisible:
    text: "Base Map"
- tapOn:
    text: "Satellite"
- tapOn:
    text: "Hiking trails"
- tapOn:
    text: "Close"
