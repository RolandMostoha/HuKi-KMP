appId: ${APP_ID}
---
- launchApp:
    clearState: false
    permissions: { all: allow }
- setLocation:
    latitude: 47.7168079
    longitude: 18.8950729
- extendedWaitUntil:
    visible:
      id: MAP_MAPBOX
    timeout: 10000
- tapOn: "Layers"
- tapOn: "Gpx Layer"
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: "Search"
      - inputText: "gpx_test_with_comments"
      - tapOn: "gpx_test_with_comments.gpx"
- runFlow:
    when:
      platform: iOS
    commands:
      - runFlow:
          when:
            notVisible: "gpx_test_with_comments.gpx"
          commands:
            - tapOn: "Browse"
            - tapOn:
                point: 72%,25%
      - tapOn:
          point: 72%,25%
- extendedWaitUntil:
    visible:
      id: MAP_MAPBOX
    timeout: 2000
- extendedWaitUntil:
    visible: "gpx_test_with_comments.gpx"
    timeout: 5000
- assertVisible: "Travel Time"
