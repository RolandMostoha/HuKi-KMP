name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify & Build & E2E tests
    timeout-minutes: 35
    runs-on: [ macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout with secrets
        uses: ./.github/actions/checkout-with-secrets/ios
        with:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install command line tools
        run: brew install swiftlint xcbeautify

      - name: SwiftLint
        run: |
          cd iosApp
          swiftlint

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest"

      - name: Build iOS App
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          cd iosApp
          set -o pipefail && xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -skipPackagePluginValidation \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -derivedDataPath build \
            SYMROOT=$(pwd)/build \
            clean build | xcbeautify

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro e2e tests
        id: run-maestro-e2e-tests
        uses: futureware-tech/simulator-action@v4
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 480000 # 8 minutes
        with:
          os: "iOS"
          model: "iPhone 17"
          os_version: "26.2"
          wait_for_boot: true
          erase_before_boot: true
          shutdown_after_job: true
      - run: |
          APP_ID="hu.mostoha.mobile.ios.huki"
          APP_PATH="$GITHUB_WORKSPACE/iosApp/build/Debug-iphonesimulator/HuKi.app"
          UDID="${{ steps.run-maestro-e2e-tests.outputs.udid }}"
          
          xcrun simctl location "$UDID" set 47.7168079,18.8950729
          xcrun simctl install "$UDID" "$APP_PATH"
          
          chmod +x tools/scripts/*.sh
          
          # Run Maestro tests
          ./tools/scripts/shared_run_meastro_tests.sh "$APP_ID" "$UDID"

      - name: Export Simulator Logs
        if: always()
        run: xcrun simctl diagnose -v --output ./sim_logs

      - name: Upload Maestro Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-reports
          path: ./.maestro/tests/
          retention-days: 7
        if: always()
