name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify & UnitTest & Build
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout with secrets
        uses: ./.github/actions/checkout-with-secrets/android
        with:
          MAPBOX_ACCESS_TOKEN_XML_BASE64: ${{ secrets.MAPBOX_ACCESS_TOKEN_XML_BASE64 }}

      - name: Detekt
        run: ./gradlew detekt

      - name: Ktlint
        run: ./gradlew ktlintCheck

      - name: Android Lint
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew test

      - name: Build Android
        run: ./gradlew assembleDebug

  instrumentation_tests:
    name: Instrumentation tests
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout with secrets
        uses: ./.github/actions/checkout-with-secrets/android
        with:
          MAPBOX_ACCESS_TOKEN_XML_BASE64: ${{ secrets.MAPBOX_ACCESS_TOKEN_XML_BASE64 }}

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: google_apis_playstore
          disable-spellchecker: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none
          script: ./gradlew :composeApp:connectedDebugAndroidTest

      - name: Upload Android Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: composeApp/build/reports/androidTests/connected/
          retention-days: 7
        if: always()

  e2e_tests:
    name: E2E tests
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout with secrets
        uses: ./.github/actions/checkout-with-secrets/android
        with:
          MAPBOX_ACCESS_TOKEN_XML_BASE64: ${{ secrets.MAPBOX_ACCESS_TOKEN_XML_BASE64 }}

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: | 
          ./gradlew :composeApp:assembleDebug
          APK_PATH=$(find composeApp/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "PATH_APK=$APK_PATH" >> $GITHUB_ENV

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro e2e tests
        env:
          APP_ID: "hu.mostoha.mobile.android.huki"
          DEVICE_ID: "emulator-5554"
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: google_apis_playstore
          disable-spellchecker: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim -camera-back none
          script: |
            adb wait-for-device
            adb emu geo fix 18.8950729 47.7168079
            adb install "$PATH_APK"
            
            chmod +x tools/scripts/*.sh
            
            # Run Maestro tests
            ./tools/scripts/shared_run_meastro_tests.sh "$APP_ID" "$DEVICE_ID"

      - name: Upload Maestro Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-reports
          path: ./.maestro/tests/
          retention-days: 7
        if: always()
